<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sudoku</title>

<style>

body{
    margin:0;
    background:#222;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:20px;
}

#controls{
    margin:15px;
}

button{
    padding:8px 15px;
    margin:5px;
    cursor:pointer;
}

#board{
    display:grid;
    grid-template-columns:repeat(9,55px);
    grid-template-rows:repeat(9,55px);
    border:4px solid white;
}

.cell{
    width:55px;
    height:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    background:#333;
    cursor:pointer;
    user-select:none;
    box-sizing:border-box;

    border-top:1px solid #777;
    border-left:1px solid #777;
}

.border-right{
    border-right:4px solid white;
}

.border-bottom{
    border-bottom:4px solid white;
}

	
#message{
    margin-top:15px;
    font-size:22px;
}

</style>

</head>

<body>

<h1>Sudoku</h1>

<div id="controls">

<button onclick="newGame()">새 게임</button>

<button onclick="hint()">힌트</button>

</div>

<div id="board"></div>

<div id="message"></div>

<script>

const solved=[
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

let boardData=[];

let fixed=[];

let selected=null;

const board=document.getElementById("board");

function createBoard(){

board.innerHTML="";

for(let r=0;r<9;r++){

for(let c=0;c<9;c++){

let div=document.createElement("div");

div.className="cell";

if(c==2||c==5)
div.classList.add("border-right");

if(r==2||r==5)
div.classList.add("border-bottom");

div.dataset.r=r;

div.dataset.c=c;

div.onclick=()=>select(div);

board.appendChild(div);

}

}

}

function select(cell){

document.querySelectorAll(".selected").forEach(x=>x.classList.remove("selected"));

selected=cell;

cell.classList.add("selected");

}

function draw(){

let cells=document.querySelectorAll(".cell");

cells.forEach(cell=>{

let r=Number(cell.dataset.r);

let c=Number(cell.dataset.c);

cell.classList.remove("fixed");
cell.classList.remove("error");

let value=boardData[r][c];

cell.textContent=value==0?"":value;

if(fixed[r][c]){
    cell.classList.add("fixed");
    cell.style.color = "white";
}else{
    cell.style.color = "#ffd700";
}

});

checkErrors();

}

function newGame(){

boardData=JSON.parse(JSON.stringify(solved));

fixed=[];

for(let r=0;r<9;r++){

fixed[r]=[];

for(let c=0;c<9;c++){

if(Math.random()<0.55){

boardData[r][c]=0;

fixed[r][c]=false;

}else{

fixed[r][c]=true;

}

}

}

draw();

document.getElementById("message").textContent="";

}

document.addEventListener("keydown",e=>{

if(selected==null)
return;

let r=Number(selected.dataset.r);

let c=Number(selected.dataset.c);

if(fixed[r][c])
return;

if(e.key>="1"&&e.key<="9"){

boardData[r][c]=Number(e.key);

draw();

checkWin();

}

if(e.key=="Backspace"||e.key=="Delete"||e.key=="0"){

boardData[r][c]=0;

draw();

}

});

function checkErrors(){

let cells=document.querySelectorAll(".cell");

cells.forEach(cell=>{

let r=Number(cell.dataset.r);

let c=Number(cell.dataset.c);

let value=boardData[r][c];

if(value==0)
return;

for(let i=0;i<9;i++){

if(i!=c&&boardData[r][i]==value){

cell.classList.add("error");

}

}

for(let i=0;i<9;i++){

if(i!=r&&boardData[i][c]==value){

cell.classList.add("error");

}

}

let sr=Math.floor(r/3)*3;
let sc=Math.floor(c/3)*3;

for(let y=sr;y<sr+3;y++){

for(let x=sc;x<sc+3;x++){

if((y!=r||x!=c)&&boardData[y][x]==value){

cell.classList.add("error");

}

}

}

});

}
function hint(){

    let empty=[];

    for(let r=0;r<9;r++){

        for(let c=0;c<9;c++){

            if(boardData[r][c]==0){

                empty.push({r,c});

            }

        }

    }

    if(empty.length==0) return;

    let pick=empty[Math.floor(Math.random()*empty.length)];

    boardData[pick.r][pick.c]=solved[pick.r][pick.c];

    fixed[pick.r][pick.c]=true;

    draw();

    checkWin();

}

function checkWin(){

    for(let r=0;r<9;r++){

        for(let c=0;c<9;c++){

            if(boardData[r][c]!=solved[r][c]){

                return;

            }

        }

    }

    document.getElementById("message").textContent="축하합니다! 퍼즐을 완료했습니다.";

}

createBoard(
);

newGame();

</script>

</body>
</html>
